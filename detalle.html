<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProyeSY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="detail-page-body">
  <div class="page-shell detail-shell">
    <header class="site-header">
      <div class="topbar panel">
        <a href="index.html" class="brand">
          <span class="brand-mark">
            <img src="assets/logo.png" alt="Logo de ProyeSY">
          </span>
          <span class="brand-copy">
            <strong>ProyeSY</strong>
            <span class="brand-tagline">Grupo de ventas digital</span>
          </span>
        </a>

        <div class="header-actions">
          <nav class="topbar-nav" aria-label="Principal">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSeJO2PZle91sXqVTl71euFJO-kwOEZujCg0KE1WWjM7OaSTHw/viewform?usp=publish-editor" target="_blank" rel="noreferrer">Reportes</a>
            <a href="https://discord.gg/v43McZyMRx" target="_blank" rel="noreferrer" class="nav-link-icon">
              <img src="https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/66e278299a53f5bf88615e90_Symbol.svg" alt="Discord">
              <span>Discord</span>
            </a>
            <a href="https://proyesy.itch.io/" target="_blank" rel="noreferrer" class="nav-link-icon nav-link-icon-dark">
              <img src="https://static.itch.io/images/itchio-textless-black.svg" alt="itch.io">
              <span>itch.io</span>
            </a>
          </nav>
          <a href="index.html#catalogo" class="button button-primary">Volver a tienda</a>
        </div>
      </div>
    </header>

    <a class="back-link" href="index.html#catalogo">Volver al catalogo</a>

    <main id="detail-app" class="detail-page" aria-live="polite">
      <div class="detail-loading panel">Cargando recurso...</div>
    </main>
  </div>

  <template id="detail-template">
    <section class="detail-stage">
      <section class="detail-hero-panel panel">
        <div class="detail-gallery-column">
          <div class="detail-main-media">
            <img id="main-image" src="" alt="">
          </div>

          <div class="detail-thumbs-shell">
            <div id="gallery-thumbs" class="detail-thumbs"></div>
          </div>
        </div>

        <div class="detail-info">
          <div class="detail-heading">
            <p class="eyebrow detail-category"></p>
            <h1 class="detail-title"></h1>
            <p class="detail-description"></p>
          </div>

          <div class="detail-badges">
            <span class="detail-badge detail-format"></span>
            <span class="detail-badge detail-compatibility"></span>
          </div>

          <div class="detail-buy-card">
            <div class="detail-price-block">
              <span class="detail-price-label">Precio</span>
              <strong class="detail-price"></strong>
              <small class="detail-delivery"></small>
            </div>

            <div class="detail-actions">
              <button id="detail-add-cart" class="button button-primary">Comprar en itch.io</button>
              <a href="#detail-video-panel" class="button button-secondary detail-video-link">Ver video</a>
            </div>
          </div>

          <div class="detail-mini-grid">
            <div class="detail-highlight">
              <span>Formato</span>
              <strong class="detail-stock"></strong>
            </div>
            <div class="detail-highlight">
              <span>Licencia</span>
              <strong class="detail-license"></strong>
            </div>
            <div class="detail-highlight">
              <span>Uso</span>
              <strong class="detail-usage"></strong>
            </div>
          </div>
        </div>
      </section>

      <section class="detail-content-grid">
        <div class="detail-main-column">
          <article class="detail-panel panel" id="detail-story-panel">
            <p class="eyebrow">Descripcion</p>
            <h2>Sobre el recurso</h2>
            <div id="detail-story" class="detail-story"></div>
          </article>

          <article class="detail-panel panel" id="detail-feature-panel">
            <p class="eyebrow">Incluye</p>
            <h2>Que recibes</h2>
            <ul id="feature-list" class="detail-list"></ul>
          </article>

          <article class="detail-panel panel detail-video-panel" id="detail-video-panel">
            <p class="eyebrow">Preview</p>
            <h2>Video del producto</h2>
            <div class="video-frame">
              <iframe
                id="detail-video"
                src=""
                title="Video del recurso"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen
              ></iframe>
            </div>
          </article>
        </div>

        <aside class="detail-side-column">
          <article class="detail-panel panel detail-license-panel">
            <p class="eyebrow">Licencia</p>
            <h2>Como puedes usarlo</h2>
            <p id="license-note-text" class="detail-copy"></p>
          </article>

          <article class="detail-panel panel detail-spec-panel" id="detail-spec-panel">
            <p class="eyebrow">Especificaciones</p>
            <h2>Datos del recurso</h2>
            <div id="spec-list" class="spec-grid"></div>
          </article>
        </aside>
      </section>

      <section class="detail-panel panel related-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Relacionados</p>
            <h2>Otros recursos que pueden gustarte</h2>
          </div>
        </div>
        <div id="related-products" class="related-grid"></div>
      </section>
    </section>
  </template>

  <script src="detail.js" type="module"></script>
</body>
</html>
