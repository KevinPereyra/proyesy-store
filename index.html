<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProyeSY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="sticky-header">
      <div class="topbar">
        <a href="index.html" class="brand">
          <span class="brand-mark">
            <img src="assets/logo.png" alt="Logo de ProyeSY">
          </span>
          <span class="brand-copy">
            <strong>ProyeSY</strong>
            <span class="brand-tagline">De ideas pequenas, nacen mundos enormes.</span>
          </span>
        </a>

        <nav class="topbar-nav" aria-label="Principal">
          <a href="https://forms.google.com/" target="_blank" rel="noreferrer">Reportes</a>
          <a href="https://discord.gg/v43McZyMRx" target="_blank" rel="noreferrer" class="nav-link-icon">
            <img src="https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/66e278299a53f5bf88615e90_Symbol.svg" alt="Discord">
            <span>Discord</span>
          </a>
          <a href="https://itch.io/" target="_blank" rel="noreferrer" class="nav-link-icon nav-link-icon-dark">
            <img src="https://static.itch.io/images/itchio-textless-black.svg" alt="itch.io">
            <span>itch.io</span>
          </a>
        </nav>
      </div>

      <div class="topbar-tools">
        <div class="field field-search">
          <label for="search">Buscar</label>
          <input id="search" type="search" placeholder="Ej: web, asset, pack, diseno, sonido">
        </div>

        <div class="field">
          <label for="category">Categorias</label>
          <select id="category">
            <option value="all">Todas</option>
          </select>
        </div>

        <div class="field">
          <label for="sort">Precios</label>
          <select id="sort">
            <option value="featured">Destacados</option>
            <option value="price-asc">Menor a mayor</option>
            <option value="price-desc">Mayor a menor</option>
            <option value="name">Nombre</option>
          </select>
        </div>
      </div>
    </header>

    <main class="shop-layout shop-layout-single">
      <section class="storefront">
        <div class="catalog-header">
          <div>
            <p class="eyebrow">Catalogo</p>
            <h1 id="productos">Tienda de ProyeSY</h1>
            <p class="catalog-text">Explora nuestros productos y compra cada articulo directamente en itch.io.</p>
          </div>
          <p id="results-count" class="catalog-results">Cargando recursos...</p>
        </div>

        <div id="product-grid" class="product-grid" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <template id="product-template">
    <article class="product-card">
      <div class="product-cover">
        <span class="product-code"></span>
        <span class="product-badge"></span>
      </div>
      <div class="product-body">
        <div class="product-meta">
          <span class="product-category"></span>
        </div>
        <h3 class="product-title"></h3>
        <p class="product-description"></p>
        <div class="product-footer">
          <div>
            <strong class="product-price"></strong>
            <small class="product-stock"></small>
          </div>
          <button class="button button-dark buy-product">Comprar</button>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js" type="module"></script>
</body>
</html>
